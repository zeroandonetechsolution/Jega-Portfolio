<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal | Jegatheeshwar</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=JetBrains+Mono:wght@300;400;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.158.0/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    
    <link rel="stylesheet" href="index.css">
</head>
<body class="page-terminal">
    <div class="crt-overlay"></div>
    <div class="scanlines"></div>

    <main id="dashboard">
        <div id="background-container"></div>

        <nav class="side-nav">
            <div class="system-logo">Jegatheeshwar</div>
            <ul class="nav-icons">
                <li data-link="index.html" title="AI Core"><a href="index.html"><i class="icon">◉</i></a></li>
                <li data-link="founder.html" title="Founder"><a href="founder.html"><i class="icon">👤</i></a></li>
                <li data-link="skills.html" title="Skills"><a href="skills.html"><i class="icon">⚡</i></a></li>
                <li data-link="projects.html" title="Projects"><a href="projects.html"><i class="icon">📁</i></a></li>
                <li data-link="architecture.html" title="Architecture"><a href="architecture.html"><i class="icon">⊞</i></a></li>
                <li data-link="terminal.html" class="active" title="Terminal"><a href="terminal.html"><i class="icon">_</i></a></li>
                <li data-link="contact.html" title="Contact"><a href="contact.html"><i class="icon">✉</i></a></li>
            </ul>
        </nav>

        <header class="top-bar">
            <div class="system-status">
                <span class="status-item">SYSTEM: <span class="status-pulse online">ONLINE</span></span>
                <span class="status-item">CPU: <span id="cpu-load">0%</span></span>
                <span class="status-item">MEM: <span id="mem-load">0%</span></span>
                <span class="status-item" id="system-clock">00:00:00</span>
            </div>
            <div class="user-info">visitor@antigravity</div>
        </header>

        <div class="p_container">
            <section id="terminal" class="panel active">
                <div class="panel-header">SYSTEM TERMINAL</div>
                <div class="panel-content terminal-body">
                    <div id="terminal-output"></div>
                    <div class="terminal-input-line">
                        <span class="prompt">visitor@antigravity:~$</span>
                        <input type="text" id="terminal-input" autofocus spellcheck="false">
                    </div>
                </div>
            </section>
        </div>

        <div id="notifications"></div>
    </main>

    <script src="script.js"></script>
</body>
</html>
